services:
  - type: web
    name: rentora-app
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false          # Set this manually in Render dashboard from Railway
      - key: RAZORPAY_KEY_ID
        sync: false          # Optional — leave blank for demo mode
      - key: RAZORPAY_KEY_SECRET
        sync: false
    healthCheckPath: /api/health
